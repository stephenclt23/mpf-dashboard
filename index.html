<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPF 投資儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419;
      --card-bg: #1a2332;
      --text: #e7e9ea;
      --text-secondary: #8b98a5;
      --border: #2f3b4b;
      --accent: #1d9bf0;
      --success: #00ba7c;
      --danger: #f4212e;
      --warning: #ffd400;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 28px; color: var(--accent); }
    .updated { font-size: 13px; color: var(--text-secondary); }
    
    .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .stat-card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .stat-number { font-size: 28px; font-weight: bold; }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .stat-card.total .stat-number { color: var(--accent); }
    .stat-card.mian .stat-number { color: var(--success); }
    .stat-card.yuet .stat-number { color: var(--warning); }
    .stat-card.gain .stat-number { color: var(--success); }
    
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .chart-container { background: var(--card-bg); border-radius: 12px; padding: 20px; }
    .chart-title { font-size: 16px; margin-bottom: 15px; color: var(--text-secondary); }
    
    .history { background: var(--card-bg); border-radius: 12px; padding: 20px; }
    .history h2 { font-size: 18px; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-secondary); font-weight: 500; font-size: 13px; }
    .positive { color: var(--success); }
    .negative { color: var(--danger); }
    
    @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 MPF 投資儀表板</h1>
      <div class="updated">最後更新: 2026-04-28</div>
    </header>
    
    <div class="overview">
      <div class="stat-card total">
        <div class="stat-number">$546,940.96</div>
        <div class="stat-label">總資產</div>
      </div>
      <div class="stat-card mian">
        <div class="stat-number">$414,442.91</div>
        <div class="stat-label">免供帳戶 (75.78%)</div>
      </div>
      <div class="stat-card yuet">
        <div class="stat-number">$132,498.05</div>
        <div class="stat-label">月供帳戶 (24.22%)</div>
      </div>
      <div class="stat-card gain">
        <div class="stat-number">+$20,268.89</div>
        <div class="stat-label">2026年收益 (+3.85%)</div>
      </div>
    </div>
    
    <div class="charts">
      <div class="chart-container">
        <div class="chart-title">總價值趨勢 (2026)</div>
        <canvas id="trendChart"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-title">資產分佈</div>
        <canvas id="pieChart"></canvas>
      </div>
    </div>
    
    <div class="history">
      <h2>📊 每月數據</h2>
      <table>
        <thead>
          <tr><th>月份</th><th>免供帳戶</th><th>月供帳戶</th><th>合併總值</th><th>月收益</th></tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
  
  <script>
    const mpfData = {
      dates: ['2026-01-01','2026-01-15','2026-01-31','2026-02-15','2026-03-15','2026-04-15','2026-04-24'],
      mian: [395820.72,399851.51,402428.77,397546.99,397546.99,414442.91,414442.91],
      yuet: [118851.35,122863.90,122863.90,119656.18,120527.38,132498.05,132498.05]
    };
    
    const monthlyData = [
      {month:'1月',mian:402428.77,yuet:122863.90,total:525292.67,gain:8120.60},
      {month:'2月',mian:397546.99,yuet:119656.18,total:517203.17,gain:-11089.50},
      {month:'3月',mian:397546.99,yuet:120527.38,total:518074.37,gain:-128.80},
      {month:'4月',mian:414442.91,yuet:132498.05,total:546940.96,gain:28866.59}
    ];
    
    // Trend Chart
    new Chart(document.getElementById('trendChart'),{
      type:'line',
      data:{labels:mpfData.dates.map(d=>d.slice(5)),datasets:[
        {label:'免供帳戶',data:mpfData.mian,borderColor:'#00ba7c',backgroundColor:'rgba(0,186,124,0.1)',fill:true,tension:0.3},
        {label:'月供帳戶',data:mpfData.yuet,borderColor:'#ffd400',backgroundColor:'rgba(255,212,0,0.1)',fill:true,tension:0.3}
      ]},
      options:{responsive:true,plugins:{legend:{labels:{color:'#e7e9ea'}}},scales:{x:{ticks:{color:'#8b98a5'},grid:{color:'#2f3b4b'}},y:{ticks:{color:'#8b98a5'},grid:{color:'#2f3b4b'}}}}
    });
    
    // Pie Chart
    new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{labels:['免供帳戶','月供帳戶'],datasets:[{data:[414442.91,132498.05],backgroundColor:['#00ba7c','#ffd400'],borderColor:'#1a2332',borderWidth:3}]},
      options:{responsive:true,plugins:{legend:{labels:{color:'#e7e9ea'}}}}
    });
    
    // History Table
    const table = document.getElementById('historyTable');
    monthlyData.forEach(r=>{
      table.innerHTML+=`<tr><td>${r.month}</td><td>$${r.mian.toLocaleString()}</td><td>$${r.yuet.toLocaleString()}</td><td>$${r.total.toLocaleString()}</td><td class="${r.gain>=0?'positive':'negative'}">${r.gain>=0?'+':''}$${r.gain.toLocaleString()}</td></tr>`;
    });
  </script>
</body>
</html>
